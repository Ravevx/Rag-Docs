<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TASForce Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }

    /* Floating Button */
    .chat-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px;
      height: 56px;
      background: #1a3c5e;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      z-index: 1000;
    }

    .chat-fab:hover {
      background: #2d5a8e;
      transform: scale(1.08);
    }

    /* Chat Window */
    .chat-window {
      position: fixed;
      bottom: 96px;
      right: 28px;
      width: 380px;
      height: 560px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      transform: scale(0.85) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), opacity 0.25s ease;
      transform-origin: bottom right;
    }

    .chat-window.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    /* Header */
    .chat-header {
      background: #1a3c5e;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-header-info h2 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .chat-header-info p {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 2px;
    }

    .chat-close {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.8;
      line-height: 1;
      padding: 2px 4px;
      transition: opacity 0.2s;
    }

    .chat-close:hover { opacity: 1; }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 82%;
      padding: 10px 13px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.55;
    }

    .message.bot {
      background: #f0f4f8;
      color: #1a3c5e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #1a3c5e;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .tool-badge {
      font-size: 10px;
      background: #e0f0ff;
      color: #1a3c5e;
      padding: 2px 8px;
      border-radius: 99px;
      margin-top: 6px;
      display: inline-block;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 13px;
      background: #f0f4f8;
      border-radius: 12px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      background: #1a3c5e;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 14px 10px;
    }

    .suggestion {
      background: #f0f4f8;
      border: 1px solid #dde3ea;
      border-radius: 16px;
      padding: 5px 11px;
      font-size: 11.5px;
      cursor: pointer;
      color: #1a3c5e;
      transition: background 0.2s;
    }

    .suggestion:hover { background: #dde3ea; }

    /* Input */
    .chat-input {
      padding: 10px 14px;
      border-top: 1px solid #e8ecf0;
      display: flex;
      gap: 8px;
    }

    .chat-input input {
      flex: 1;
      padding: 9px 14px;
      border: 1px solid #dde3ea;
      border-radius: 24px;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input input:focus { border-color: #1a3c5e; }

    .chat-input button {
      background: #1a3c5e;
      color: white;
      border: none;
      border-radius: 50%;
      width: 38px; height: 38px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .chat-input button:hover    { background: #2d5a8e; }
    .chat-input button:disabled { background: #ccc; cursor: not-allowed; }

    /* Notification dot on FAB */
    .chat-fab .dot {
      position: absolute;
      top: 6px; right: 6px;
      width: 10px; height: 10px;
      background: #e74c3c;
      border-radius: 50%;
      border: 2px solid white;
    }
  </style>
</head>
<body>

  <!-- Floating Button -->
  <button class="chat-fab" onclick="toggleChat()" id="fab" title="Chat with Tasmina">
    💬
    <span class="dot" id="dot"></span>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow">

    <div class="chat-header">
      <div class="chat-header-info">
        <h2>Tasmina</h2>
        <p>TASForce Virtual Assistant</p>
      </div>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">
        👋 Hi! I'm Tasmina, TASForce's virtual assistant. Ask me anything about our services, team, or how we can help your business!
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <span class="suggestion" onclick="sendSuggestion(this)">What services do you offer?</span>
      <span class="suggestion" onclick="sendSuggestion(this)">How can I contact TASForce?</span>
      <span class="suggestion" onclick="sendSuggestion(this)">Tell me about TASForce</span>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Ask Tasmina anything..."
             onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()" id="sendBtn">➤</button>
    </div>

  </div>

  <script>
    function toggleChat() {
      const win = document.getElementById('chatWindow');
      const dot = document.getElementById('dot');
      win.classList.toggle('open');
      dot.style.display = 'none'; // hide dot once opened
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const question = input.value.trim();
      if (!question) return;

      appendMessage(question, 'user');
      input.value = '';
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('suggestions').style.display = 'none';

      const typing = showTyping();

      try {
        const res = await fetch('/agent/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        typing.remove();
        appendBotMessage(data.answer, data.tool_used);
      } catch (e) {
        typing.remove();
        appendMessage('Sorry, something went wrong. Please try again.', 'bot');
      }

      document.getElementById('sendBtn').disabled = false;
    }

    function sendSuggestion(el) {
      document.getElementById('userInput').value = el.textContent;
      sendMessage();
    }

    function appendMessage(text, role) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function appendBotMessage(text, tool) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message bot';
      div.innerHTML = text.replace(/\n/g, '<br>');
      const badge = document.createElement('div');
      badge.className = 'tool-badge';
      badge.textContent = `⚙️ ${tool}`;
      div.appendChild(badge);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
